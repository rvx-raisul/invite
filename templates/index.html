<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Email Sender</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 40% 20%, hsla(228, 100%, 74%, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(189, 100%, 56%, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(355, 100%, 93%, 0.1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #cbd5e1;
        }

        input,
        select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            min-height: 20px;
        }

        .success {
            color: #4ade80;
        }

        .error {
            color: #f87171;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Invitation Sender</h1>
        <p class="subtitle">Send perfectly formatted Google emails</p>

        <form id="emailForm">
            <div class="form-group">
                <label for="to_email">Customer Gmail (To)</label>
                <input type="email" id="to_email" required placeholder="victim@example.com">
            </div>



            <div class="form-group">
                <label for="sender_email">Family Gmail (Optional)</label>
                <input type="email" id="sender_email" placeholder="masudrana282427@gmail.com">
            </div>

            <div class="form-group">
                <label for="invite_link">Invitation Link</label>
                <input type="url" id="invite_link" required placeholder="https://youtube.com/...">
            </div>

            <div class="form-group">
                <label for="template_type">Template</label>
                <select id="template_type" required>
                    <option value="youtube">YouTube Premium Invite</option>
                    <option value="storage">Google One Storage Invite</option>
                    <option value="combo">Combo (YouTube + Storage)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="lang">Language</label>
                <select id="lang" required>
                    <option value="bn">Bengali (বাংলা)</option>
                    <option value="en">English</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">Send Email</button>
            <div id="status" class="status"></div>
        </form>
    </div>

    <script>
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const statusEl = document.getElementById('status');

            btn.classList.add('loading');
            btn.textContent = 'Sending...';
            statusEl.textContent = '';
            statusEl.className = 'status';

            const payload = {
                to_email: document.getElementById('to_email').value,
                sender_email: document.getElementById('sender_email').value || 'noreply@premiumwala.com',
                invite_link: document.getElementById('invite_link').value,
                template_type: document.getElementById('template_type').value,
                lang: document.getElementById('lang').value,
            };

            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    statusEl.textContent = 'Email sent successfully!';
                    statusEl.classList.add('success');
                    e.target.reset();
                } else {
                    statusEl.textContent = data.error || 'Failed to send email.';
                    statusEl.classList.add('error');
                }
            } catch (error) {
                statusEl.textContent = 'An error occurred while sending.';
                statusEl.classList.add('error');
            } finally {
                btn.classList.remove('loading');
                btn.textContent = 'Send Email';
            }
        });
    </script>
</body>

</html>
